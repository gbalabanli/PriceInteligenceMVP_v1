<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PriceSmart AI Mockup</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="./assets/css/styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-icon" aria-hidden="true">&#9673;</span>
        <span class="brand-label">PriceSmart AI</span>
      </div>

      <nav class="menu" aria-label="Primary Navigation">
        <button class="menu-item" data-route="/dashboard" data-menu-item="dashboard" data-i18n="menu.dashboard"></button>
        <button class="menu-item" data-route="/yz-fiyat-onerileri" data-menu-item="recommendations" data-i18n="menu.aiRecommendations"></button>
        <button class="menu-item" data-route="/dynamic-pricing" data-menu-item="dynamicPricing" data-i18n="menu.dynamicPricing"></button>
        <button class="menu-item" data-route="/ab-testing" data-menu-item="abTesting" data-i18n="menu.abTesting"></button>
      </nav>
    </aside>

    <section class="workspace">
      <header class="topbar">
        <div class="topbar-left">
          <input id="search-input" type="search" class="search" />
        </div>

        <div class="topbar-right">
          <button class="icon-button" data-route="/settings" aria-label="Settings">
            <span aria-hidden="true">&#9881;</span>
            <span data-i18n="header.settings"></span>
          </button>
          <button class="icon-button" data-route="/scenario-lab" aria-label="Scenario Lab">
            <span aria-hidden="true">&#129514;</span>
            <span data-i18n="header.scenarioLab"></span>
          </button>

          <div class="lang-switch" role="group" aria-label="Language">
            <button class="lang-btn" data-locale="tr">TR</button>
            <button class="lang-btn" data-locale="en">EN</button>
          </div>
        </div>
      </header>

      <main id="content" class="content"></main>
      <div id="toast" class="toast" aria-live="polite"></div>

      <div id="confirm-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="confirm-title">
        <div class="modal-card">
          <h3 id="confirm-title" class="card-title">Confirm</h3>
          <p id="confirm-message" class="muted">Are you sure?</p>
          <div class="btn-row modal-actions">
            <button class="btn secondary" data-action="confirm-cancel">Cancel</button>
            <button class="btn primary" data-action="confirm-accept">Confirm</button>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script type="module" src="./assets/js/app.js"></script>
</body>
</html>
